<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار عربي 2 - الجزء 9</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --wrong: #f85149;
    --gold: #e3b341;
    --text: #e6edf3;
    --muted: #8b949e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%;
    max-width: 800px;
    text-align: center;
    padding: 30px 0 20px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 1rem;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 10px 0 24px;
    width: 100%;
    max-width: 800px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    text-align: center;
    flex: 1;
    min-width: 120px;
  }

  .stat .val {
    font-size: 1.5rem;
    font-weight: 800;
  }

  .stat .lbl {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .stat.correct .val { color: var(--accent2); }
  .stat.wrong-s .val { color: var(--wrong); }
  .stat.total .val { color: var(--accent); }
  .stat.score .val { color: var(--gold); }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 800px;
    margin-bottom: 20px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a371f7);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* Quiz card */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 800px;
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 22px;
    font-weight: 500;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    text-align: right;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(88, 166, 255, 0.08);
    transform: translateX(-3px);
  }

  .option-btn .opt-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }

  .option-btn.correct {
    border-color: var(--accent2);
    background: rgba(63, 185, 80, 0.12);
  }

  .option-btn.correct .opt-letter {
    background: var(--accent2);
    color: #fff;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(248, 81, 73, 0.1);
  }

  .option-btn.wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
  }

  .option-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(63,185,80,0.15); color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }
  .feedback.wrong-fb { background: rgba(248,81,73,0.12); color: var(--wrong); border: 1px solid rgba(248,81,73,0.3); }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
    max-width: 800px;
    margin-bottom: 30px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d1117;
  }

  .btn-primary:hover { background: #79b8ff; transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* Result screen */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    width: 100%;
    max-width: 800px;
  }

  .result-screen.show { display: flex; }

  .result-emoji {
    font-size: 5rem;
    margin-bottom: 20px;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .result-score {
    font-size: 3rem;
    font-weight: 800;
    color: var(--gold);
  }

  .result-msg {
    color: var(--muted);
    margin-top: 10px;
    font-size: 1.1rem;
  }

  .result-details {
    display: flex;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .result-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 28px;
    min-width: 130px;
  }

  .result-detail .val { font-size: 1.8rem; font-weight: 800; }
  .result-detail .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  /* Wrong answers review */
  .wrong-review {
    width: 100%;
    max-width: 800px;
    margin-top: 20px;
    display: none;
  }

  .wrong-review.show { display: block; }

  .wrong-review h3 {
    color: var(--wrong);
    margin-bottom: 14px;
    font-size: 1.1rem;
  }

  .wrong-item {
    background: var(--card);
    border: 1px solid rgba(248,81,73,0.25);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 0.92rem;
    line-height: 1.7;
  }

  .wrong-item .wi-q { color: var(--text); font-weight: 600; margin-bottom: 6px; }
  .wrong-item .wi-wrong { color: var(--wrong); }
  .wrong-item .wi-correct { color: var(--accent2); }

  /* Filter */
  .filter-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
    width: 100%;
    max-width: 800px;
  }

  .filter-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(88,166,255,0.08);
  }

  .jump-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .jump-wrap input {
    width: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    text-align: center;
  }

  .quiz-main { width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<header>
  <h1>📚 اختبار عربي 2 — الجزء 9 من 10</h1>
  <p>أسئلة من 345 إلى 387 — أجب على الأسئلة واختبر معلوماتك</p>
</header>

<div class="quiz-main" id="quizMain">
  <div class="stats-bar">
    <div class="stat total"><div class="val" id="statTotal">0</div><div class="lbl">إجمالي الأسئلة</div></div>
    <div class="stat correct"><div class="val" id="statCorrect">0</div><div class="lbl">إجابات صحيحة</div></div>
    <div class="stat wrong-s"><div class="val" id="statWrong">0</div><div class="lbl">إجابات خاطئة</div></div>
    <div class="stat score"><div class="val" id="statScore">0%</div><div class="lbl">نسبتك</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progText">السؤال 1 من 43</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="quiz-card" id="quizCard">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="controls">
    <button class="btn btn-ghost" onclick="prevQ()">&#x25C4; السابق</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>التالي &#x25BA;</button>
    <button class="btn btn-ghost" onclick="showResults()">&#x1F4CA; النتائج</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="result-details">
    <div class="result-detail"><div class="val" id="rCorrect" style="color:var(--accent2)"></div><div class="lbl">صحيح</div></div>
    <div class="result-detail"><div class="val" id="rWrong" style="color:var(--wrong)"></div><div class="lbl">خطأ</div></div>
    <div class="result-detail"><div class="val" id="rSkipped" style="color:var(--muted)"></div><div class="lbl">لم تُجب</div></div>
  </div>
  <div style="display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="restartQuiz()">🔄 إعادة الاختبار</button>
    <button class="btn btn-ghost" onclick="retryWrong()">❌ إعادة الخاطئة</button>
    <button class="btn btn-ghost" onclick="backToQuiz()">&#x25C4; العودة</button>
  </div>
  <div class="wrong-review" id="wrongReview">
    <h3>❌ الأسئلة التي أخطأت فيها:</h3>
    <div id="wrongList"></div>
  </div>
</div>

<script>

const QUIZ_NUM = 9;
const START_Q = 345;
const ALL_QUESTIONS = [
{q:`"للموت ظفر وناب" - يوجد في العبارة السابقة طباق:`,opts:['صواب','خطأ'],ans:1},
{q:`(أحب الجود لا البخل) - حرف العطف (لا) دل على إثبات الحكم للمعطوف عليه ونفيه عن المعطوف (2):`,opts:['صواب','خطأ'],ans:0},
{q:`قال تعالى: "وكلوا واشربوا ولا تسرفوا". فاعل الفعل "اشربوا":`,opts:['ضمير متصل','ضمير مستتر وجوباً','اسم ظاهر','ضمير مستتر جوازاً'],ans:0},
{q:`الأَكفاء جمع كفء، ويعنى بها:`,opts:['الأفضل','الأرجح','النظير','الأقل'],ans:2},
{q:`(شكور) على زنة (فعول) تدل على:`,opts:['اسم المفعول','صيغة المبالغة','اسم المكان','اسم الفاعل'],ans:1},
{q:`يصف الشاعر حمزة شحاتة في قصيدته مدينة جدة الجميلة، الفاتنة بمعالمها وشواطئها، الغنية بقيمتها الحضارية:`,opts:['صواب','خطأ'],ans:0},
{q:`قال تعالى: "وقل اعملوا فسيرى الله عملكم". علامة بناء فعل الأمر في الآية:`,opts:['السكون','حذف النون','الفتح','حذف حرف العلة'],ans:1},
{q:`اتفاق الشطر الأول من البيت مع قافية القصيدة يسمى الترصيع:`,opts:['صواب','خطأ'],ans:0},
{q:`الفعل المضارع المعتل الآخر بالياء هو:`,opts:['يتمنى','يعطي','ينجو','يرمي'],ans:1},
{q:`المثال الصحيح على أسلوب النهي هو (2):`,opts:['قوله تعالى (لا يكتمون الله حديثاً)','قوله تعالى (لا تمش في الأرض مرحاً)','قوله تعالى (لا يدخلون الجنة حتى يلج الجمل في سم الخياط)','قوله تعالى (لا تتبعوا السبل)'],ans:1},
{q:`حنانيك مصدر قياسي بصيغة المثنى لفظاً لا معنى:`,opts:['صواب','خطأ - مصدر سماعي'],ans:1},
{q:`حنانيك مصدر سماعي بصيغة المثنى لفظاً ومعنى:`,opts:['صواب','خطأ - لفظاً لا معنى'],ans:1},
{q:`الألف في كلمة (أربعمائة) زائدة تكتب وتنطق:`,opts:['صواب','خطأ'],ans:1},
{q:`الألف في كلمة (أربعمائة) زائدة تنطق ولا تكتب:`,opts:['صواب','خطأ - زائدة تكتب ولا تنطق'],ans:1},
{q:`سبب كتابة الألف في كلمة (العطايا)، لأن الكلمة ثلاثية سبقت ألفها اللينة بياء:`,opts:['صواب','خطأ - أكثر من ثلاثة حروف سبقت ألفها بياء'],ans:1},
{q:`علامة نصب المفعول به الأول في قولنا: (سأل الطالب المعلمين سؤالاً) الفتحة الظاهرة على آخره:`,opts:['صواب','خطأ - المعلمين مفعول أول منصوب وعلامة نصبه الياء'],ans:1},
{q:`حرف العطف (ثم) في جملة: ذهبت إلى الرياض، يفيد المشاركة بدون الترتيب:`,opts:['صواب','خطأ'],ans:1},
{q:`أنت لن ترضي عدوك مهما فعلت - علامة نصب الفعل ترضي الفتحة المقدرة منع من ظهورها الثقل:`,opts:['صواب','خطأ'],ans:1},
{q:`في قولنا: سلمت على المدرب فالـلاعب، يعرب (اللاعب) معطوف مرفوع وعلامة رفعه الضمة الظاهرة على آخره:`,opts:['صواب','خطأ'],ans:1},
{q:`الفعل لن يتهاونوا في قولنا الأطباء لن يتهاونوا عن القيام بواجبهم. مجزوم بحذف النون:`,opts:['صواب','خطأ'],ans:1},
{q:`كلمة (عفور) على وزن فعيل صيغة مبالغة:`,opts:['صواب','خطأ'],ans:1},
{q:`جميع الأسماء الرباعية فأكثر تكتب ألفها اللينة ياء بلا شرط:`,opts:['صواب','خطأ'],ans:1},
{q:`إذا في قولنا (إذا قضى الله أمراً سلم عبده) أداة شرطية جازمة:`,opts:['صواب','خطأ'],ans:1},
{q:`لولا العمل لم تكن للعلم فائدة. "لولا في المثال" أداة شرط غير جازمة:`,opts:['صواب','خطأ'],ans:0},
{q:`ومن لم يُصانع في أمورٍ كثيرةٍ يُضَرَّسْ بأنياب ويُوطَأ بمنسم. الفعل المضارع (يُصانع) وقع:`,opts:['منصوباً','مرفوعاً','مبنياً','مجزوماً'],ans:3},
{q:`الأسلوب في قوله تعالى "ولا تكن من الغافلين":`,opts:['أسلوب خبري','أسلوب إنشائي الغرض منه التمني','أسلوب إنشائي الغرض منه النهي','أسلوب إنشائي الغرض منه الدعاء'],ans:2},
{q:`الأسلوب في قوله تعالى "ولا تصعر خدك للناس":`,opts:['أسلوب خبري','أسلوب إنشائي الغرض منه الدعاء','أسلوب إنشائي الغرض منه التمني','أسلوب إنشائي الغرض منه النهي'],ans:3},
{q:`الفتيات يعرفن الطريق الصحيح. الفعل المضارع في الجملة (2):`,opts:['مبني على السكون','مجزوم وعلامة جزمه السكون','مبني على الفتح','منصوب وعلامة نصبه الفتحة'],ans:0},
{q:`دَعى المؤمن ربه. كُتبت الألف اللينة في الجملة بطريقة صحيحة:`,opts:['صواب','خطأ'],ans:1},
{q:`كتبت الألف اللينة ألفاً في الفعل دعا في قوله تعالى: (هنالك دعا زكريا ربه) لأنه ثلاثي أصل ألفه منقلب عن واو:`,opts:['صواب','خطأ'],ans:0},
{q:`تُكتب الألف اللينة على صورة الألف في الأفعال الثلاثية إذا كانت منقلبة عن واو (2):`,opts:['صواب','خطأ'],ans:0},
{q:`الجملة التي تشتمل على مضارع منصوب:`,opts:['لن تَزِلَّ قدم المعتصم باالله','أسأل الله توفيقاً وسداداً','لم أتقاعس عن فعل الخير','يأسف المؤمن على فوات الطاعات'],ans:0},
{q:`"فلا أعطي الهوى فضل مقودي". المفعول الأول في الجملة السابقة:`,opts:['الضمير المتصل الياء','فضل','الهوى','مقودي'],ans:2},
{q:`يُسمى نقل الكلام بين الناس بقصد الإفساد والوقيعة بين الطرفين:`,opts:['غيبة','نميمة','زور وكذب','بهتان'],ans:1},
{q:`"الطلاب يحضرون المحاضرات" - الفعل "يحضرون" فعل مضارع مرفوع وعلامة رفعه:`,opts:['حذف حرف العلة','ثبوت النون','الضمة المقدرة','الضمة الظاهرة'],ans:1},
{q:`المجموعة التي جميع أفعالها من الأفعال الخمسة:`,opts:['أقبَل، مستشارون، تسرفين','يتسابقون، تحلمين، يسجدان','يركضون، يشفقن، معلمان','يستكين، يشتاق، يغامر'],ans:1},
{q:`"حسن الخلق وحسن الجوار يُعمران الديار ويزيدان في الأعمار". علامة رفع الفعلين المضارعين:`,opts:['الضمة المقدَّرة','ثبوت النون','الألف','الضمة الظاهرة'],ans:1},
{q:`تزاد الألف بعد:`,opts:['واو الجماعة','الاسم المنصوب المنتهي بهمزة متطرفة مسبوقة بألف','الاسم المنصوب المنتهي بهمزة متطرفة على ألف','الاسم المنصوب المنتهي بتاء التأنيث المربوطة'],ans:0},
{q:`يستفزُّ الأسيرَ منها الطليق. الفن البلاغي بين كلمتي (الأسير، الطليق) هو:`,opts:['طباق','كناية','مقابلة','جناس'],ans:0},
{q:`بين كلمة الأسير والطليق: طباق:`,opts:['صواب','خطأ'],ans:0},
{q:`الجملة التي اشتملت على فعل مضارع مبني:`,opts:['تتنقل النحلة بين الأزهار','لا تعبَثْ بأسلاك الكهرباء','المسلمون يتمسكون بتعاليم الدين','الأمهات يبذلن الجهود في تربية أبنائهن'],ans:3},
{q:`"قفا نبكِ من ذكرى حبيبٍ ومنزلِ". الفعل "قفا" مبني على:`,opts:['الفتح الظاهر','حذف حرف العلة','حذف النون','الفتح المقدَّر'],ans:2},
{q:`امتازت قصيدة "جدة" للشاعر حمزة شحاتة بقلة الصور البيانية:`,opts:['صواب','خطأ'],ans:1},
];

let currentIndex = 0;
let answers = new Array(ALL_QUESTIONS.length).fill(null);
let userChoices = new Array(ALL_QUESTIONS.length).fill(null);
let showingWrong = false;
let filteredIndices = ALL_QUESTIONS.map(function(_, i) { return i; });

var letters = ['أ','ب','ج','د','هـ'];

function renderQuestion() {
  var globalIdx = filteredIndices[currentIndex];
  var q = ALL_QUESTIONS[globalIdx];

  document.getElementById('qNumber').textContent = 'سؤال ' + (START_Q + globalIdx) + ' من 387';
  document.getElementById('qText').textContent = q.q;

  var optsCont = document.getElementById('optionsContainer');
  optsCont.innerHTML = '';

  q.opts.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="opt-letter">' + letters[i] + '</span><span>' + opt + '</span>';
    btn.onclick = (function(choice, idx) {
      return function() { selectAnswer(choice, idx); };
    })(i, globalIdx);
    if (answers[globalIdx] !== null) {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      else if (i === userChoices[globalIdx]) btn.classList.add('wrong');
    }
    optsCont.appendChild(btn);
  });

  var fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  if (answers[globalIdx] !== null) {
    if (answers[globalIdx]) {
      fb.className = 'feedback show correct-fb';
      fb.textContent = '✅ إجابة صحيحة!';
    } else {
      fb.className = 'feedback show wrong-fb';
      fb.textContent = '❌ خطأ! الإجابة الصحيحة: ' + q.opts[q.ans];
    }
  }

  var pct = Math.round(((currentIndex + 1) / filteredIndices.length) * 100);
  document.getElementById('progText').textContent = 'السؤال ' + (currentIndex + 1) + ' من ' + filteredIndices.length;
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('nextBtn').disabled = answers[globalIdx] === null;
  updateStats();
}

function selectAnswer(choice, globalIdx) {
  if (answers[globalIdx] !== null) return;
  var q = ALL_QUESTIONS[globalIdx];
  userChoices[globalIdx] = choice;
  answers[globalIdx] = (choice === q.ans);

  var btns = document.getElementById('optionsContainer').querySelectorAll('.option-btn');
  btns.forEach(function(btn, i) {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === choice && choice !== q.ans) btn.classList.add('wrong');
  });

  var fb = document.getElementById('feedback');
  if (answers[globalIdx]) {
    fb.className = 'feedback show correct-fb';
    fb.textContent = '✅ إجابة صحيحة!';
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.textContent = '❌ خطأ! الإجابة الصحيحة: ' + q.opts[q.ans];
  }
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

function nextQ() {
  if (currentIndex < filteredIndices.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResults();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

function updateStats() {
  var correct = answers.filter(function(a) { return a === true; }).length;
  var wrong = answers.filter(function(a) { return a === false; }).length;
  var answered = correct + wrong;
  var pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('statTotal').textContent = ALL_QUESTIONS.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statScore').textContent = pct + '%';
}

function showResults() {
  document.getElementById('quizMain').style.display = 'none';
  var rs = document.getElementById('resultScreen');
  rs.classList.add('show');
  var correct = answers.filter(function(a) { return a === true; }).length;
  var wrong = answers.filter(function(a) { return a === false; }).length;
  var skipped = answers.filter(function(a) { return a === null; }).length;
  var answered = correct + wrong;
  var pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkipped').textContent = skipped;
  var emoji = '🎉', msg = 'ممتاز جداً! أحسنت!';
  if (pct < 50) { emoji = '😔'; msg = 'لا تيأس! راجع المادة وحاول مرة أخرى.'; }
  else if (pct < 70) { emoji = '🙂'; msg = 'جيد! يمكنك التحسين أكثر.'; }
  else if (pct < 90) { emoji = '😊'; msg = 'جيد جداً! استمر على هذا المستوى.'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;

  var wrongList = document.getElementById('wrongList');
  wrongList.innerHTML = '';
  var wrongQs = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    if (answers[i] === false) wrongQs.push(i);
  }
  if (wrongQs.length > 0) {
    document.getElementById('wrongReview').classList.add('show');
    wrongQs.forEach(function(i) {
      var q = ALL_QUESTIONS[i];
      var div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = '<div class="wi-q">س' + (START_Q + i) + ': ' + q.q + '</div>' +
        '<div class="wi-wrong">❌ إجابتك: ' + (userChoices[i] !== null ? q.opts[userChoices[i]] : '---') + '</div>' +
        '<div class="wi-correct">✅ الصحيحة: ' + q.opts[q.ans] + '</div>';
      wrongList.appendChild(div);
    });
  }
}

function backToQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizMain').style.display = 'flex';
  showingWrong = false;
  filteredIndices = ALL_QUESTIONS.map(function(_, i) { return i; });
  renderQuestion();
}

function restartQuiz() {
  answers = new Array(ALL_QUESTIONS.length).fill(null);
  userChoices = new Array(ALL_QUESTIONS.length).fill(null);
  currentIndex = 0;
  showingWrong = false;
  filteredIndices = ALL_QUESTIONS.map(function(_, i) { return i; });
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('wrongReview').classList.remove('show');
  document.getElementById('quizMain').style.display = 'flex';
  renderQuestion();
}

function retryWrong() {
  var wrongIdx = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    if (answers[i] === false) wrongIdx.push(i);
  }
  if (wrongIdx.length === 0) { alert('لا توجد أسئلة خاطئة!'); return; }
  filteredIndices = wrongIdx;
  currentIndex = 0;
  showingWrong = true;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('wrongReview').classList.remove('show');
  document.getElementById('quizMain').style.display = 'flex';
  renderQuestion();
}

renderQuestion();

</script>
</body>
</html>
