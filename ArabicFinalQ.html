<!DOCTYPE html>  
<html lang="ar" dir="rtl">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>اختبار عربي 2 - فاينل</title>  
<style>  
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');  
  
  :root {  
    --bg: #0d1117;  
    --surface: #161b22;  
    --card: #1c2230;  
    --border: #30363d;  
    --accent: #58a6ff;  
    --accent2: #3fb950;  
    --wrong: #f85149;  
    --gold: #e3b341;  
    --text: #e6edf3;  
    --muted: #8b949e;  
  }  
  
  * { box-sizing: border-box; margin: 0; padding: 0; }  
  
  body {  
    font-family: 'Tajawal', sans-serif;  
    background: var(--bg);  
    color: var(--text);  
    min-height: 100vh;  
    display: flex;  
    flex-direction: column;  
    align-items: center;  
    padding: 20px;  
  }  
  
  header {  
    width: 100%;  
    max-width: 800px;  
    text-align: center;  
    padding: 30px 0 20px;  
  }  
  
  header h1 {  
    font-size: 2rem;  
    font-weight: 800;  
    color: var(--accent);  
    letter-spacing: -0.5px;  
  }  
  
  header p {  
    color: var(--muted);  
    margin-top: 6px;  
    font-size: 1rem;  
  }  
  
  /* Stats bar */  
  .stats-bar {  
    display: flex;  
    gap: 16px;  
    justify-content: center;  
    flex-wrap: wrap;  
    margin: 10px 0 24px;  
    width: 100%;  
    max-width: 800px;  
  }  
  
  .stat {  
    background: var(--surface);  
    border: 1px solid var(--border);  
    border-radius: 10px;  
    padding: 10px 20px;  
    text-align: center;  
    flex: 1;  
    min-width: 120px;  
  }  
  
  .stat .val {  
    font-size: 1.5rem;  
    font-weight: 800;  
  }  
  
  .stat .lbl {  
    font-size: 0.78rem;  
    color: var(--muted);  
    margin-top: 2px;  
  }  
  
  .stat.correct .val { color: var(--accent2); }  
  .stat.wrong-s .val { color: var(--wrong); }  
  .stat.total .val { color: var(--accent); }  
  .stat.score .val { color: var(--gold); }  
  
  /* Progress */  
  .progress-wrap {  
    width: 100%;  
    max-width: 800px;  
    margin-bottom: 20px;  
  }  
  
  .progress-info {  
    display: flex;  
    justify-content: space-between;  
    font-size: 0.85rem;  
    color: var(--muted);  
    margin-bottom: 8px;  
  }  
  
  .progress-bar {  
    height: 6px;  
    background: var(--border);  
    border-radius: 10px;  
    overflow: hidden;  
  }  
  
  .progress-fill {  
    height: 100%;  
    background: linear-gradient(90deg, var(--accent), #a371f7);  
    border-radius: 10px;  
    transition: width 0.4s ease;  
  }  
  
  /* Quiz card */  
  .quiz-card {  
    background: var(--card);  
    border: 1px solid var(--border);  
    border-radius: 16px;  
    padding: 28px;  
    width: 100%;  
    max-width: 800px;  
    margin-bottom: 20px;  
    animation: fadeIn 0.3s ease;  
  }  
  
  @keyframes fadeIn {  
    from { opacity: 0; transform: translateY(12px); }  
    to { opacity: 1; transform: translateY(0); }  
  }  
  
  .q-number {  
    font-size: 0.8rem;  
    color: var(--accent);  
    font-weight: 700;  
    margin-bottom: 14px;  
    letter-spacing: 1px;  
    text-transform: uppercase;  
  }  
  
  .q-text {  
    font-size: 1.1rem;  
    line-height: 1.8;  
    color: var(--text);  
    margin-bottom: 22px;  
    font-weight: 500;  
  }  
  
  /* Options */  
  .options {  
    display: flex;  
    flex-direction: column;  
    gap: 10px;  
  }  
  
  .option-btn {  
    background: var(--surface);  
    border: 1.5px solid var(--border);  
    border-radius: 10px;  
    padding: 14px 18px;  
    text-align: right;  
    font-family: 'Tajawal', sans-serif;  
    font-size: 1rem;  
    color: var(--text);  
    cursor: pointer;  
    transition: all 0.2s ease;  
    display: flex;  
    align-items: center;  
    gap: 12px;  
  }  
  
  .option-btn:hover:not(:disabled) {  
    border-color: var(--accent);  
    background: rgba(88, 166, 255, 0.08);  
    transform: translateX(-3px);  
  }  
  
  .option-btn .opt-letter {  
    min-width: 28px;  
    height: 28px;  
    border-radius: 6px;  
    background: var(--border);  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    font-size: 0.8rem;  
    font-weight: 700;  
    color: var(--muted);  
    flex-shrink: 0;  
  }  
  
  .option-btn.correct {  
    border-color: var(--accent2);  
    background: rgba(63, 185, 80, 0.12);  
  }  
  .option-btn.correct .opt-letter {  
    background: var(--accent2);  
    color: #fff;  
  }  
  
  .option-btn.wrong {  
    border-color: var(--wrong);  
    background: rgba(248, 81, 73, 0.1);  
  }  
  
  .option-btn.wrong .opt-letter {  
    background: var(--wrong);  
    color: #fff;  
  }  
  
  .option-btn:disabled { cursor: default; }  
  
  /* Feedback */  
  .feedback {  
    margin-top: 16px;  
    padding: 12px 16px;  
    border-radius: 10px;  
    font-size: 0.95rem;  
    font-weight: 600;  
    display: none;  
    align-items: center;  
    gap: 10px;  
  }  
  
  .feedback.show { display: flex; }  
  .feedback.correct-fb { background: rgba(63,185,80,0.15); color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }  
  .feedback.wrong-fb { background: rgba(248,81,73,0.12); color: var(--wrong); border: 1px solid rgba(248,81,73,0.3); }  
  
  /* Controls */  
  .controls {  
    display: flex;  
    gap: 12px;  
    justify-content: center;  
    flex-wrap: wrap;  
    width: 100%;  
    max-width: 800px;  
    margin-bottom: 30px;  
  }  
  
  .btn {  
    padding: 12px 28px;  
    border-radius: 10px;  
    border: none;  
    font-family: 'Tajawal', sans-serif;  
    font-size: 1rem;  
    font-weight: 700;  
    cursor: pointer;  
    transition: all 0.2s;  
  }  
  
  .btn-primary {  
    background: var(--accent);  
    color: #0d1117;  
  }  
  
  .btn-primary:hover { background: #79b8ff; transform: translateY(-2px); }  
  .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }  
  
  .btn-ghost {  
    background: transparent;  
    color: var(--muted);  
    border: 1.5px solid var(--border);  
  }  
  
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }  
  
  /* Result screen */  
  .result-screen {  
    display: none;  
    flex-direction: column;  
    align-items: center;  
    text-align: center;  
    padding: 40px 20px;  
    width: 100%;  
    max-width: 800px;  
  }  
  
  .result-screen.show { display: flex; }  
  
  .result-emoji {  
    font-size: 5rem;  
    margin-bottom: 20px;  
    animation: bounce 0.6s ease;  
  }  
  
  @keyframes bounce {  
    0%,100% { transform: translateY(0); }  
    50% { transform: translateY(-15px); }  
  }  
  
  .result-score {  
    font-size: 3rem;  
    font-weight: 800;  
    color: var(--gold);  
  }  
  
  .result-msg {  
    color: var(--muted);  
    margin-top: 10px;  
    font-size: 1.1rem;  
  }  
  
  .result-details {  
    display: flex;  
    gap: 20px;  
    margin-top: 30px;  
    flex-wrap: wrap;  
    justify-content: center;  
  }  
  
  .result-detail {  
    background: var(--card);  
    border: 1px solid var(--border);  
    border-radius: 12px;  
    padding: 16px 28px;  
    min-width: 130px;  
  }  
  
  .result-detail .val { font-size: 1.8rem; font-weight: 800; }  
  .result-detail .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }  
  
  /* Wrong answers review */  
  .wrong-review {  
    width: 100%;  
    max-width: 800px;  
    margin-top: 20px;  
    display: none;  
  }  
  
  .wrong-review.show { display: block; }  
  
  .wrong-review h3 {  
    color: var(--wrong);  
    margin-bottom: 14px;  
    font-size: 1.1rem;  
  }  
  .wrong-item {  
    background: var(--card);  
    border: 1px solid rgba(248,81,73,0.25);  
    border-radius: 10px;  
    padding: 14px 18px;  
    margin-bottom: 10px;  
    font-size: 0.92rem;  
    line-height: 1.7;  
  }  
  
  .wrong-item .wi-q { color: var(--text); font-weight: 600; margin-bottom: 6px; }  
  .wrong-item .wi-wrong { color: var(--wrong); }  
  .wrong-item .wi-correct { color: var(--accent2); }  
  
  /* Filter */  
  .filter-bar {  
    display: flex;  
    gap: 10px;  
    justify-content: center;  
    flex-wrap: wrap;  
    margin-bottom: 20px;  
    width: 100%;  
    max-width: 800px;  
  }  
  
  .filter-btn {  
    padding: 7px 18px;  
    border-radius: 20px;  
    border: 1.5px solid var(--border);  
    background: transparent;  
    color: var(--muted);  
    font-family: 'Tajawal', sans-serif;  
    font-size: 0.88rem;  
    cursor: pointer;  
    transition: all 0.2s;  
  }  
  .filter-btn.active, .filter-btn:hover {  
    border-color: var(--accent);  
    color: var(--accent);  
    background: rgba(88,166,255,0.08);  
  }  
  
  .jump-wrap {  
    display: flex;  
    gap: 8px;  
    align-items: center;  
    justify-content: center;  
    margin-bottom: 16px;  
  }  
  
  .jump-wrap input {  
    width: 80px;  
    padding: 8px 12px;  
    border-radius: 8px;  
    border: 1.5px solid var(--border);  
    background: var(--surface);  
    color: var(--text);  
    font-family: 'Tajawal', sans-serif;  
    font-size: 1rem;  
    text-align: center;  
  }  
  
  .quiz-main { width: 100%; display: flex; flex-direction: column; align-items: center; }  
</style>  
</head>  
<body>  
  
<header>  
  <h1>📚 اختبار عربي 2 — فاينل</h1>  
  <p>أجب على الأسئلة واختبر معلوماتك</p>  
</header>  
  
<div class="quiz-main" id="quizMain">  
  
  <div class="stats-bar">  
    <div class="stat total"><div class="val" id="statTotal">0</div><div class="lbl">إجمالي الأسئلة</div></div>  
    <div class="stat correct"><div class="val" id="statCorrect">0</div><div class="lbl">إجابات صحيحة</div></div>  
    <div class="stat wrong-s"><div class="val" id="statWrong">0</div><div class="lbl">إجابات خاطئة</div></div>  
    <div class="stat score"><div class="val" id="statScore">0%</div><div class="lbl">نسبتك</div></div>  
  </div>  
  
  <div class="progress-wrap">  
    <div class="progress-info">  
      <span id="progText">السؤال 1 من 430</span>  
      <span id="progPct">0%</span>  
    </div>  
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>  
  </div>  
  
  <div class="filter-bar">  
    <button class="filter-btn active" onclick="setMode('all')">كل الأسئلة</button>  
    <button class="filter-btn" onclick="setMode('wrong')">الأسئلة الخاطئة فقط</button>  
    <button class="filter-btn" onclick="setMode('unanswered')">غير المجابة</button>  
  </div>  
  
  <div class="jump-wrap">  
    <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.9rem" onclick="jumpToQ()">انتقل</button>  
    <input type="number" id="jumpInput" placeholder="رقم السؤال" min="1" max="430">  
    <span style="color:var(--muted);font-size:0.9rem">الانتقال لسؤال:</span>  
  </div>  
  
  <div class="quiz-card" id="quizCard">  
    <div class="q-number" id="qNumber"></div>  
    <div class="q-text" id="qText"></div>  
    <div class="options" id="optionsContainer"></div>  
    <div class="feedback" id="feedback"></div>  
  </div>  
  
  <div class="controls">  
    <button class="btn btn-ghost" onclick="prevQ()">◀ السابق</button>  
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>التالي ▶</button>  
    <button class="btn btn-ghost" onclick="showResults()">📊 النتائج</button>  
  </div>  
  
</div>  
  
<div class="result-screen" id="resultScreen">  
  <div class="result-emoji" id="resultEmoji">🎉</div>  
  <div class="result-score" id="resultScore"></div>  
  <div class="result-msg" id="resultMsg"></div>  
  <div class="result-details">  
    <div class="result-detail"><div class="val" id="rCorrect" style="color:var(--accent2)"></div><div class="lbl">صحيح</div></div>  
    <div class="result-detail"><div class="val" id="rWrong" style="color:var(--wrong)"></div><div class="lbl">خطأ</div></div>  
    <div class="result-detail"><div class="val" id="rSkipped" style="color:var(--muted)"></div><div class="lbl">لم تُجب</div></div>  
  </div>  
  <div style="display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center">  
    <button class="btn btn-primary" onclick="restartQuiz()">🔄 إعادة الاختبار</button>  
    <button class="btn btn-ghost" onclick="retryWrong()">❌ إعادة الخاطئة</button>  
    <button class="btn btn-ghost" onclick="backToQuiz()">◀ العودة</button>  
  </div>  
  <div class="wrong-review" id="wrongReview">  
    <h3>❌ الأسئلة التي أخطأت فيها:</h3>  
    <div id="wrongList"></div>  
  </div>  
</div>  
  
<script>  
const ALL_QUESTIONS = [  
  {q:`(اصدق في أقوالك). فاعل فعل الأمر في الجملة ضمير مستتر وجوباً:`,opts:['صواب','خطأ'],ans:0},  
  {q:`معنى (النزق) هو طيش الشباب وخفته:`,opts:['صواب','خطأ'],ans:0},  
  {q:`لن تفيقي من حب جدة - الفعل في الجملة منصوب؛ لأنه سبق بأداة نصب:`,opts:['صواب','خطأ'],ans:0},  
  {q:`قال تعالى: "فقولوا يا أبانا إن ابنك سرق". الفعل "قولوا" مبني على:`,opts:['الفتح','حذف حرف العلة','حذف النون','السكون'],ans:2},  
  {q:`تتناجي أصداؤه في روابيك إذا عادها الخيال الطروق - المقصود بالطروق:`,opts:['صباحاً','غدوة','ليلاً','ضحى'],ans:2},  
  {q:`الفعل المضارع المعتل الآخر "يسعى" إذا سبق بجازم فإن علامة جزمه:`,opts:['الألف','الواو','حذف النون','حذف حرف العلة'],ans:3},  
  {q:`من الأمثلة على السجع:`,opts:['لا تؤجل عمل اليوم إلى الغد','زيد كثير الرماد','الله نور السموات والأرض مثل نوره كمشكاة فيها مصباح','الصوم حرمان مشروع، وتأديب بالجوع، وخشوع لله وخضوع'],ans:3},  
  {q:`من الفنون البلاغية فن يعرف بفن الاحتراس أو التحرز، وهو أن يكثر الشاعر من الاستعارات حتى يبتعد بأسلوبه عن أسلوب العوام:`,opts:['صواب','خطأ'],ans:1},  
  {q:`الفن الذي يمكن تعريفه بأنه نص نثري، يوجه إلى إنسان مخصوص بغية التعبير عما في نفس الكاتب من مشاعر وأحاسيس، ويكتب بصياغة وجدانية:`,opts:['الخطابة','الرسائل السياسية','الرسائل الأدبية الوجدانية','الشعر'],ans:2},  
  {q:`اتاد الرجل في الأمر. معنى (اتاد) في الجملة:`,opts:['تماثل وتشابه','تعود عليه','تناجي بحديث خاص','تثبت فيه'],ans:3},  
  {q:`في قولنا (لن ينمو النبات). علامة نصب الفعل (ينمو) الفتحة الظاهرة لأنه معتل بالواو:`,opts:['صواب','خطأ'],ans:0},  
  {q:`من اقتنع بما لديه استغنى. "من" في المثال أداة شرط غير جازمة:`,opts:['صواب','خطأ'],ans:1},  
  {q:`قال تعالى: "وجعلوا بينه وبين الجنة نسباً" - لفظ (جنة) في الآية تعني:`,opts:['الأجنة الصغار','سترة ووقاية','دار النعيم','الجن'],ans:3},  
  {q:`"متى تأتِهِ تعشو إلى ضوء ناره **** تجد خير نارٍ عندها خير موقد". (متى) في البيت أداة شرط غير جازمة:`,opts:['صواب','خطأ'],ans:1},  
  {q:`قال تعالى: (فذكر فما أنت بنعمت ربك بكاهن ولا مجنون). فعل الأمر في الآية مبني على:`,opts:['حذف حرف العلة','حذف النون','السكون','الضم'],ans:2},  
  {q:`"سَتُسافِرْنَ إلى مكة نهاية هذا العام". الفعل المضارع في الجملة:`,opts:['مبني على السكون','مرفوع وعلامة رفعه الضمة','منصوب وعلامة نصبه الفتحة','مبني على الفتح'],ans:0},  
  {q:`قال تعالى: "يا بني اركب معنا". الفاعل:`,opts:['ضمير مستتر جوازاً','ضمير مستتر وجوباً','ضمير متصل','اسم ظاهر'],ans:1},  
  {q:`لفظ "حنانيك" مصدر جاء بصيغة المثنى لفظاً ومعنى ويعني به حنانين اثنين:`,opts:['صواب','خطأ'],ans:1},  
  {q:`كلمة "الصبوح" تعني الصباح الباكر:`,opts:['صواب','خطأ'],ans:1},  
  {q:`المثال الصحيح الذي يمثل زيادة الألف في آخر الاسم المنصوب المنون هو:`,opts:['سمعت نبأاً','حفظت أجزاءً من القرآن','حفظت درساً','قرأت قصتاً'],ans:2},  
  {q:`تغادر الوفود المؤتمر - الفاعل في الجملة جاء ضميراً مستتراً:`,opts:['صواب','خطأ'],ans:1},  
  {q:`شاهَدْنَ البرامج المفيدة. فاعل الفعل في الجملة:`,opts:['البرامج','الضمير المتصل نون النسوة','المفيدة','ضمير مستتر'],ans:1},  
  {q:`المجموعة التي جميع أفعالها مضارعة:`,opts:['تعالى، أقبل، استجب','تولى، يتطور، سارع','التفتن، يتكاسل، توقف','يناصر، يعترف، يستفيق'],ans:3},  
  {q:`قال تعالى: (إذ يغشى السدرة ما يغشى) - سبب كتابة الألف على صورة الياء في كلمة "يغشى":`,opts:['لأنها فعل أصله ياء','لأنها اسم أصله ياء','لأنها اسم أصله واو','لأنها فعل أصله واو'],ans:0},  
  {q:`"وتعاونوا على البر والتقوى ولا تعاونوا على الإثم والعدوان". فعل الأمر في الآية:`,opts:['مبني على الفتح','مبني على حذف حرف العلة','مبني على حذف النون','مبني على السكون'],ans:2},  
  {q:`علمت الغيبة محرمة. الفعل (علم) نصب مفعولين أصلهما المبتدأ والخبر:`,opts:['صواب','خطأ'],ans:0},  
  {q:`احتاج الرسول صلى الله عليه وسلم ليتواصل مع رؤساء القبائل وملوك الدول لدعوتهم إلى الإسلام إلى:`,opts:['الأمثال','الشعر','الرسائل والمخاطبات','الخطابة'],ans:2},

  {q:`بر والديك لتنال رضا ربك. الفعل (تنال) مرفوع:`,opts:['صواب','خطأ'],ans:1},  
  {q:`السبب في كتابة الألف في كلمة "فرنسا" على هذه الصورة لأنها:`,opts:['علم أعجمي','اسم مبني','اسم خماسي ألفها منقلبة عن واو','اسم خماسي ألفها منقلبة عن ياء'],ans:0},  
  {q:`قال تعالى: "قلنا يا نار كوني برداً وسلاماً على إبراهيم". "كوني" فعل أمر مبني على:`,opts:['حذف النون','حذف حرف العلة','السكون','الكسر'],ans:0},  
  {q:`تدخل أفعال التحويل على المبتدأ والخبر فتنسخ حكمهما ووظيفتهما:`,opts:['صواب','خطأ'],ans:0},  
  {q:`{وَلَا تُسْرِفُوا} - علامة جزم الفعل (تسرفوا) حذف النون؛ لأنه:`,opts:['من الأفعال الخمسة','فعل أمر اتصلت به واو الجماعة','فعل أمر معتل الآخر بالواو','مسبوق بأداة نصب'],ans:0},  
  {q:`حروف العطف التي لا يشترط فيها مشاركة بين المعطوف والمعطوف عليه هي:`,opts:['(لا، لكن، بل)','(أو، أم، الواو)','(ثم، حتى، أو)','(الواو، الفاء، ثم)'],ans:0},  
  {q:`"لا تنظر إلى مساوئ صديقك بل انظر إلى محاسنه". (بل) في المثال حرف عطف يفيد الإشراك في المعنى:`,opts:['صواب','خطأ'],ans:1},  
  {q:`يقول حمزة شحاتة: "لي ماضٍ لم أنسه فيك قد غص بشجو غروبه والشروق". المحسن البلاغي في البيت هو طباق:`,opts:['صواب','خطأ'],ans:0},  
  {q:`قال تعالى: "يا بني اركب معنا". اركب فعل أمر مبني على:`,opts:['السكون','الفتح','الضم','الكسر'],ans:0},  
  {q:`المقصود "بمفرق الطريق" الموضع الذي يتشعب منه طريق آخر:`,opts:['صواب','خطأ'],ans:0},  
  {q:`سميت التوابع بهذا الاسم؛ لأنها تتبع ما بعدها:`,opts:['صواب','خطأ - لأنها تتبع ما قبلها'],ans:1},  
  {q:`قائل قصيدة "فخر وعتاب" هو أبو الوليد ابن زيدون:`,opts:['صواب','خطأ'],ans:1},  
  {q:`ركز في عملك. الفاعل في الجملة ضمير مستتر تقديره "هو":`,opts:['صواب','خطأ - تقديره أنت'],ans:1},  
  {q:`تمتع بحقك في المشاركة. "تمتع" في الجملة:`,opts:['فعل أمر','فعل مضارع','فعل ماضٍ','مصدر'],ans:0},  
  {q:`"استعن بنصيحة حازم". فعل الأمر علامة جزمه حذف النون:`,opts:['صواب','خطأ'],ans:1},  
  {q:`في الأسماء الرباعية فأكثر تكتب الألف اللينة على صورة الألف بدون شرط سبق ألفها بالياء:`,opts:['صواب','خطأ'],ans:1},  
  {q:`قال تعالى: "واستعينوا بالصبر والصلاة" - فعل الأمر في الآية مبني على:`,opts:['حذف النون','السكون','حذف حرف العلة','الضم'],ans:0},  
  {q:`(متى تقم على إغاثة الملهوف، تنل الرضا من الله) - (متى) في المثال، أداة شرط غير جازمة:`,opts:['صواب','خطأ'],ans:1},  
  {q:`(المؤمن عطوف على الفقراء): كلمة (عطوف)، صيغة مبالغة:`,opts:['صواب','خطأ'],ans:0},  
  {q:`ومن لم يصانع في أمور كثيرة يضرس بأنياب ويوطأ بمنسم. الفعل المضارع "يصانع" وقع (2):`,opts:['مرفوعاً','مجزوماً','مبنياً','منصوباً'],ans:1},  
  {q:`بين كلمتي: (التقى الفسوق) طباق:`,opts:['صواب','خطأ'],ans:0},  
  {q:`تكتب "جزء" في حالة النصب:`,opts:['جزءاً','جزءً','جزءٍ','جزءن'],ans:0},  
  {q:`الكلمة التي تقبل زيادة الألف:`,opts:['قالوا','همة','خطأ','أرجو'],ans:0},  
  {q:`هذا هو الوجه الوحيد الصحيح لكتابة (ذالك) الكلمة:`,opts:['صواب','خطأ'],ans:1},  
  {q:`قال تعالى: (إذ يغشى السدرة ما يغشى) - الفعلان في الآية نوعهما:`,opts:['مضارع من الأفعال الخمسة','ماضٍ','مضارع','أمر'],ans:2},  
  {q:`علامة رفع الأفعال الخمسة ثبوت النون، وعلامة نصبها وجزمها حذف النون:`,opts:['صواب','خطأ'],ans:0},  
  {q:`يبنى الفعل المضارع على السكون إذا اتصلت به نون التوكيد:`,opts:['صواب','خطأ'],ans:1},  
  {q:`(النهى بين شاطئيك غريق). الفن البلاغي في الشطر السابق (2):`,opts:['استعارة مكنية','جناس','طباق','مقابلة'],ans:0},  
];  
// State  
let questions = [...ALL_QUESTIONS];  
let currentIndex = 0;  
let answers = new Array(ALL_QUESTIONS.length).fill(null); // null = unanswered, true/false  
let userChoices = new Array(ALL_QUESTIONS.length).fill(null);  
let mode = 'all';  
let filteredIndices = [];  
  
const letters = ['أ','ب','ج','د','هـ'];  
  
function buildFilteredList() {  
  if (mode === 'all') {  
    filteredIndices = ALL_QUESTIONS.map((_, i) => i);  
  } else if (mode === 'wrong') {  
    filteredIndices = ALL_QUESTIONS.map((_, i) => i).filter(i => answers[i] === false);  
  } else if (mode === 'unanswered') {  
    filteredIndices = ALL_QUESTIONS.map((_, i) => i).filter(i => answers[i] === null);  
  }  
  if (filteredIndices.length === 0 && mode !== 'all') {  
    filteredIndices = ALL_QUESTIONS.map((_, i) => i);  
  }  
}  
  
function setMode(m) {  
  mode = m;  
  document.querySelectorAll('.filter-btn').forEach((b, i) => {  
    b.classList.toggle('active', ['all','wrong','unanswered'][i] === m);  
  });  
  buildFilteredList();  
  currentIndex = 0;  
  renderQuestion();  
}  
function renderQuestion() {  
  if (filteredIndices.length === 0) return;  
  const globalIdx = filteredIndices[currentIndex];  
  const q = ALL_QUESTIONS[globalIdx];  
  
  document.getElementById('qNumber').textContent = `سؤال ${globalIdx + 1} من ${ALL_QUESTIONS.length}`;  
  document.getElementById('qText').textContent = q.q;  
  
  const optsCont = document.getElementById('optionsContainer');  
  optsCont.innerHTML = '';  
  
  q.opts.forEach((opt, i) => {  
    const btn = document.createElement('button');  
    btn.className = 'option-btn';  
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;  
    btn.onclick = () => selectAnswer(i, globalIdx);  
      
    // If already answered  
    if (answers[globalIdx] !== null) {  
      btn.disabled = true;  
      if (i === q.ans) btn.classList.add('correct');  
      else if (i === userChoices[globalIdx]) btn.classList.add('wrong');  
    }  
    optsCont.appendChild(btn);  
  });  
  
  // Feedback  
  const fb = document.getElementById('feedback');  
  fb.className = 'feedback';  
  fb.textContent = '';  
  if (answers[globalIdx] !== null) {  
    if (answers[globalIdx]) {  
      fb.className = 'feedback show correct-fb';  
      fb.textContent = '✅ إجابة صحيحة!';  
    } else {  
      fb.className = 'feedback show wrong-fb';  
      fb.textContent = `❌ خطأ! الإجابة الصحيحة: ${q.opts[q.ans]}`;  
    }  
  }  
  
  // Progress  
  const total = filteredIndices.length;  
  const pct = Math.round(((currentIndex + 1) / total) * 100);  
  document.getElementById('progText').textContent = `السؤال ${currentIndex + 1} من ${total}`;  
  document.getElementById('progPct').textContent = pct + '%';  
  document.getElementById('progFill').style.width = pct + '%';  
  
  // Next btn  
  document.getElementById('nextBtn').disabled = answers[globalIdx] === null;  
updateStats();  
}  
  
function selectAnswer(choice, globalIdx) {  
  if (answers[globalIdx] !== null) return;  
  const q = ALL_QUESTIONS[globalIdx];  
  userChoices[globalIdx] = choice;  
  answers[globalIdx] = choice === q.ans;  
  
  const btns = document.getElementById('optionsContainer').querySelectorAll('.option-btn');  
  btns.forEach((btn, i) => {  
    btn.disabled = true;  
    if (i === q.ans) btn.classList.add('correct');  
    else if (i === choice && choice !== q.ans) btn.classList.add('wrong');  
  });  
  
  const fb = document.getElementById('feedback');  
  if (answers[globalIdx]) {  
    fb.className = 'feedback show correct-fb';  
    fb.textContent = '✅ إجابة صحيحة!';  
  } else {  
    fb.className = 'feedback show wrong-fb';  
    fb.textContent = `❌ خطأ! الإجابة الصحيحة: ${q.opts[q.ans]}`;  
  }  
  document.getElementById('nextBtn').disabled = false;  
  updateStats();  
}  
  
function nextQ() {  
  if (currentIndex < filteredIndices.length - 1) {  
    currentIndex++;  
    renderQuestion();  
  } else {  
    showResults();  
  }  
}  
  
function prevQ() {  
  if (currentIndex > 0) {  
    currentIndex--;  
    renderQuestion();  
  }  
}  
  
function jumpToQ() {  
  const val = parseInt(document.getElementById('jumpInput').value);  
  if (val >= 1 && val <= ALL_QUESTIONS.length) {  
    const idx = filteredIndices.indexOf(val - 1);  
    if (idx !== -1) {  
      currentIndex = idx;  
    } else {  
      // find nearest  
      currentIndex = 0;  
      for (let i = 0; i < filteredIndices.length; i++) {  
        if (filteredIndices[i] >= val - 1) { currentIndex = i; break; }  
      }  
    }  
    renderQuestion();  
  }  
}  
  
function updateStats() {  
  const correct = answers.filter(a => a === true).length;  
  const wrong = answers.filter(a => a === false).length;  
  const answered = correct + wrong;  
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;  
  
document.getElementById('statTotal').textContent = ALL_QUESTIONS.length;  
  document.getElementById('statCorrect').textContent = correct;  
  document.getElementById('statWrong').textContent = wrong;  
  document.getElementById('statScore').textContent = pct + '%';  
}  
  
function showResults() {  
  document.getElementById('quizMain').style.display = 'none';  
  const rs = document.getElementById('resultScreen');  
  rs.classList.add('show');  
  
  const correct = answers.filter(a => a === true).length;  
  const wrong = answers.filter(a => a === false).length;  
  const skipped = answers.filter(a => a === null).length;  
  const answered = correct + wrong;  
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;  
  
  document.getElementById('resultScore').textContent = pct + '%';  
  document.getElementById('rCorrect').textContent = correct;  
  document.getElementById('rWrong').textContent = wrong;  
  document.getElementById('rSkipped').textContent = skipped;  
  
  let emoji = '🎉', msg = 'ممتاز جداً! أحسنت!';  
  if (pct < 50) { emoji = '😔'; msg = 'لا تيأس! راجع المادة وحاول مرة أخرى.'; }  
  else if (pct < 70) { emoji = '🙂'; msg = 'جيد! يمكنك التحسين أكثر.'; }  
  else if (pct < 90) { emoji = '😊'; msg = 'جيد جداً! استمر على هذا المستوى.'; }  
  document.getElementById('resultEmoji').textContent = emoji;  
  document.getElementById('resultMsg').textContent = msg;  
  
  // Wrong list  
  const wrongList = document.getElementById('wrongList');  
  wrongList.innerHTML = '';  
  const wrongQs = ALL_QUESTIONS.map((q, i) => ({q, i})).filter(({i}) => answers[i] === false);  
  if (wrongQs.length > 0) {  
    document.getElementById('wrongReview').classList.add('show');  
    wrongQs.forEach(({q, i}) => {  
      const div = document.createElement('div');  
      div.className = 'wrong-item';  
      div.innerHTML = `<div class="wi-q">س${i+1}: ${q.q}</div>  
        <div class="wi-wrong">❌ إجابتك: ${q.opts[userChoices[i]] || '---'}</div>  
        <div class="wi-correct">✅ الصحيحة: ${q.opts[q.ans]}</div>`;  
      wrongList.appendChild(div);  
    });  
  }  
}  
  
function backToQuiz() {  
  document.getElementById('resultScreen').classList.remove('show');  
  document.getElementById('quizMain').style.display = 'flex';  
  renderQuestion();  
}  
  
function restartQuiz() {  
  answers = new Array(ALL_QUESTIONS.length).fill(null);  
  userChoices = new Array(ALL_QUESTIONS.length).fill(null);  
  currentIndex = 0;  
  mode = 'all';  
  buildFilteredList();  
  document.getElementById('resultScreen').classList.remove('show');  
  document.getElementById('wrongReview').classList.remove('show');  
  document.getElementById('quizMain').style.display = 'flex';  
  renderQuestion();  
}  
  
function retryWrong() {  
  currentIndex = 0;  
  mode = 'wrong';  
  document.getElementById('resultScreen').classList.remove('show');  
  document.getElementById('wrongReview').classList.remove('show');  
  document.getElementById('quizMain').style.display = 'flex';  
  buildFilteredList();  
  renderQuestion();  
}  
  
// Init  
buildFilteredList();  
renderQuestion();  
</script>  
</body>  
</html>
